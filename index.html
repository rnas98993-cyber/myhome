<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home Controller</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f9; padding: 20px; }
        h2 { color: #333; }
        .container { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 30px; }
        .btn { width: 200px; padding: 15px; font-size: 18px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; color: white; transition: 0.3s; }
        .on { background-color: #2ecc71; box-shadow: 0 4px #27ae60; }
        .off { background-color: #e74c3c; box-shadow: 0 4px #c0392b; }
        .btn:active { transform: translateY(4px); box-shadow: none; }
    </style>
</head>
<body>

    <h2>Smart Home ESP32-C3 Controller</h2>
    <p>Status Koneksi: <span id="status" style="font-weight:bold; color:orange;">Menghubungkan...</span></p>

    <div class="container">
        <button id="r1" class="btn off" onclick="toggleRelay('relay1')">RELAY 1: OFF</button>
        <button id="r2" class="btn off" onclick="toggleRelay('relay2')">RELAY 2: OFF</button>
        <button id="r3" class="btn off" onclick="toggleRelay('relay3')">RELAY 3: OFF</button>
        <button id="r4" class="btn off" onclick="toggleRelay('relay4')">RELAY 4: OFF</button>
    </div>

    <script>
        // Link asli milikmu + akhiran .json (Wajib untuk metode REST API tanpa API Key)
        const dbURL = "https://smarthomeq-2f7e3-default-rtdb.asia-southeast1.firebasedatabase.app/";
        let currentStatus = {};

        function AmbilData() {
            fetch(dbURL)
            .then(res => {
                if(!res.ok) throw new Error('Akses Cloud Ditolak');
                return res.json();
            })
            .then(data => {
                currentStatus = data;
                document.getElementById("status").innerText = "Terhubung ke Cloud (Aktif)";
                document.getElementById("status").style.color = "green";
                
                for (let i = 1; i <= 4; i++) {
                    let key = "relay" + i;
                    let btn = document.getElementById("r" + i);
                    let val = (data && data[key] !== undefined) ? data[key] : 0;
                    
                    if (val == 1) {
                        btn.innerText = "RELAY " + i + ": ON";
                        btn.className = "btn on";
                    } else {
                        btn.innerText = "RELAY " + i + ": OFF";
                        btn.className = "btn off";
                    }
                }
            })
            .catch(err => {
                document.getElementById("status").innerText = "Error Terputus (Cek Internet/Rules)";
                document.getElementById("status").style.color = "red";
                console.error(err);
            });
        }

        function toggleRelay(relayName) {
            let nilaiBaru = currentStatus[relayName] == 1 ? 0 : 1;
            let updateData = {};
            updateData[relayName] = nilaiBaru;

            fetch(dbURL, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(updateData)
            })
            .then(() => AmbilData())
            .catch(err => console.error("Gagal update:", err));
        }

        // Ambil data secara berkala setiap 1.5 detik
        setInterval(AmbilData, 1500);
        AmbilData();
    </script>
</body>
</html>
